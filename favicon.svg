<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for top wall (light blue) -->
    <linearGradient id="top-grad" x1="32" y1="8" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A90E2"/>
      <stop offset="1" stop-color="#357ABD"/>
    </linearGradient>
    
    <!-- Gradient for left wall (darkest, shadow) -->
    <linearGradient id="left-grad" x1="10" y1="20" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B3A57"/>
      <stop offset="1" stop-color="#12283C"/>
    </linearGradient>
    
    <!-- Gradient for right wall (half-shadow) -->
    <linearGradient id="right-grad" x1="54" y1="20" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A5C8D"/>
      <stop offset="1" stop-color="#1B3A57"/>
    </linearGradient>
  </defs>

  <!-- Top wall -->
  <path d="M32 8L54 20L32 32L10 20L32 8Z" fill="url(#top-grad)"/>
  
  <!-- Left wall -->
  <path d="M10 20V44L32 56V32L10 20Z" fill="url(#left-grad)"/>
  
  <!-- Right wall -->
  <path d="M54 20V44L32 56V32L54 20Z" fill="url(#right-grad)"/>

  <!-- Internal "technical" lines on edges adding depth -->
  <path d="M32 32V56" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <path d="M10 20L32 32L54 20" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <path d="M32 8L10 20" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M32 8L54 20" stroke="white" stroke-opacity="0.2" stroke-width="1"/>

  <!-- External thin outline (glow) -->
  <path d="M32 8L54 20V44L32 56L10 44V20L32 8Z" stroke="#4A90E2" stroke-opacity="0.3" stroke-width="0.5"/>
</svg>