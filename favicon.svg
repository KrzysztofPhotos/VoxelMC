<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient dla górnej ściany (jasny niebieski) -->
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4db8ff"/>
      <stop offset="100%" stop-color="#007acc"/>
    </linearGradient>
    
    <!-- Gradient dla lewej ściany (najciemniejszy, cień) -->
    <linearGradient id="left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#005f9e"/>
      <stop offset="100%" stop-color="#002b4d"/>
    </linearGradient>
    
    <!-- Gradient dla prawej ściany (półcień) -->
    <linearGradient id="right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#007acc"/>
      <stop offset="100%" stop-color="#004c8c"/>
    </linearGradient>
  </defs>

  <!-- Górna ściana -->
  <polygon points="50,8 92,30 50,53 8,30" fill="url(#top)"/>
  
  <!-- Lewa ściana -->
  <polygon points="8,30 50,53 50,95 8,72" fill="url(#left)"/>
  
  <!-- Prawa ściana -->
  <polygon points="50,53 92,30 92,72 50,95" fill="url(#right)"/>
  
  <!-- Wewnętrzne, "techniczne" linie na krawędziach dodające głębi -->
  <polyline points="50,53 50,95" stroke="#ffffff" stroke-width="2" opacity="0.4" fill="none" stroke-linecap="round"/>
  <polyline points="8,30 50,53" stroke="#ffffff" stroke-width="2" opacity="0.6" fill="none" stroke-linecap="round"/>
  <polyline points="92,30 50,53" stroke="#ffffff" stroke-width="2" opacity="0.2" fill="none" stroke-linecap="round"/>
  
  <!-- Zewnętrzny, bardzo cienki obrys (glow) -->
  <polygon points="50,8 92,30 92,72 50,95 8,72 8,30" stroke="#00aaff" stroke-width="1.5" opacity="0.8" fill="none" stroke-linejoin="round"/>
</svg>